apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: token-ratelimit
  namespace: agentgateway-spike
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: tiny-llama-llminferenceservice-route
  traffic:
    rateLimit:
      local:
        - tokens: 10000
          unit: Hours
