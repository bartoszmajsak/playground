apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-reader
  namespace: controlled-deployment-spike
automountServiceAccountToken: false
---
apiVersion: v1
kind: Secret
metadata:
  name: metrics-reader-token
  namespace: controlled-deployment-spike
  annotations:
    kubernetes.io/service-account.name: metrics-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spike-metrics-reader
rules:
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spike-metrics-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spike-metrics-reader
subjects:
  - kind: ServiceAccount
    name: metrics-reader
    namespace: controlled-deployment-spike
