apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: llmisvc-vllm
  namespace: controlled-deployment-spike
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      kserve.io/component: workload
  podMetricsEndpoints:
    - portNumber: 8000
      path: /metrics
      interval: 10s
      params:
        format:
          - prometheus
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          targetLabel: llm_isvc_name
